services:
  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"
      - "3000:3000/tcp"
    volumes:
      - /srv/dev-disk-by-uuid-CHANGE_ME/docker/data/adguard-home/work:/opt/adguardhome/work
      - /srv/dev-disk-by-uuid-CHANGE_ME/docker/data/adguard-home/conf:/opt/adguardhome/conf
